<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <style>
    text { font-family: 'Pretendard Variable', 'Inter', system-ui, sans-serif; }
    .title { font-size: 11px; font-weight: 700; fill: #4f46e5; }
    .label { font-size: 10px; font-weight: 600; fill: #0f172a; }
    .sublabel { font-size: 8.5px; fill: #64748b; }
    .badge { font-size: 8px; font-weight: 700; fill: #fff; }
  </style>

  <!-- Before: 문제 상황 -->
  <text x="170" y="18" text-anchor="middle" class="title">BEFORE  -  동시 환전 장애</text>
  <rect x="10" y="28" width="320" height="220" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>

  <!-- 동시 요청 -->
  <rect x="30" y="48" width="90" height="34" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="75" y="69" text-anchor="middle" class="label">Client A</text>
  <rect x="30" y="92" width="90" height="34" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="75" y="113" text-anchor="middle" class="label">Client B</text>

  <!-- 화살표 -->
  <line x1="120" y1="65" x2="155" y2="65" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="120" y1="109" x2="155" y2="109" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 환전 API (락 없음) -->
  <rect x="158" y="56" width="100" height="50" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="208" y="77" text-anchor="middle" class="label">환전 API</text>
  <text x="208" y="92" text-anchor="middle" class="sublabel">락 경합 + 중복 미차단</text>

  <!-- DB -->
  <line x1="258" y1="81" x2="283" y2="81" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <rect x="286" y="60" width="30" height="42" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="301" y="85" text-anchor="middle" class="sublabel">DB</text>

  <!-- 결과: 오류 -->
  <rect x="70" y="148" width="200" height="36" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="163" text-anchor="middle" class="sublabel">중복 환전 발생 + 잔액 불일치</text>
  <text x="170" y="176" text-anchor="middle" style="font-size:8px;fill:#dc2626;font-weight:700;">오류율 90%+</text>

  <!-- 화살표: API -> 결과 -->
  <line x1="208" y1="106" x2="208" y2="145" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowRed)"/>

  <!-- After: 해결 -->
  <text x="545" y="18" text-anchor="middle" class="title">AFTER  -  멱등성 + 트랜잭션 분리</text>
  <rect x="390" y="28" width="320" height="220" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>

  <!-- 요청 -->
  <rect x="406" y="48" width="68" height="34" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="69" text-anchor="middle" class="label">Client</text>

  <!-- 화살표 -->
  <line x1="474" y1="65" x2="499" y2="65" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Idempotency Check -->
  <rect x="502" y="44" width="90" height="42" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="547" y="62" text-anchor="middle" class="label">Idempotency</text>
  <text x="547" y="76" text-anchor="middle" class="sublabel">Key 중복 체크</text>

  <!-- 분기 -->
  <line x1="592" y1="55" x2="632" y2="55" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="612" y="50" text-anchor="middle" class="sublabel">신규</text>

  <!-- 최소 트랜잭션 -->
  <rect x="635" y="40" width="62" height="50" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="666" y="60" text-anchor="middle" class="label">최소</text>
  <text x="666" y="74" text-anchor="middle" class="label">TX</text>
  <text x="666" y="86" text-anchor="middle" class="sublabel">DB</text>

  <!-- 중복이면 반려 -->
  <line x1="547" y1="86" x2="547" y2="116" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="565" y="105" class="sublabel">중복</text>
  <rect x="502" y="118" width="90" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="547" y="137" text-anchor="middle" class="sublabel">409 Conflict 반환</text>

  <!-- 결과 -->
  <rect x="440" y="170" width="220" height="36" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="550" y="185" text-anchor="middle" class="sublabel">중복 환전 원천 차단 + 잔액 정합성 확보</text>
  <text x="550" y="198" text-anchor="middle" style="font-size:8px;fill:#16a34a;font-weight:700;">JMeter 100건 동시 - 오류율 90%+ 감소</text>

  <line x1="666" y1="90" x2="666" y2="160" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="666" y1="160" x2="662" y2="168" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="666" y1="160" x2="550" y2="168" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fca5a5"/>
    </marker>
  </defs>
</svg>