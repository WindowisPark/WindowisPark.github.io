<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" fill="none">
  <style>
    text { font-family: 'Pretendard Variable', 'Inter', system-ui, sans-serif; }
    .title { font-size: 11px; font-weight: 700; fill: #4f46e5; }
    .label { font-size: 10px; font-weight: 600; fill: #0f172a; }
    .sublabel { font-size: 8.5px; fill: #64748b; }
    .tool { font-size: 7.5px; fill: #475569; }
    .agent-name { font-size: 9px; font-weight: 700; }
  </style>

  <text x="360" y="16" text-anchor="middle" class="title">JobMate  -  LangGraph 멀티에이전트 라우팅</text>

  <!-- User Input -->
  <rect x="20" y="40" width="90" height="44" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="65" y="60" text-anchor="middle" class="label">User</text>
  <text x="65" y="74" text-anchor="middle" class="sublabel">WebSocket</text>

  <!-- Arrow -->
  <line x1="110" y1="62" x2="140" y2="62" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#mBlue)"/>

  <!-- Stage 1: Emotion Analysis -->
  <rect x="143" y="34" width="100" height="56" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="193" y="54" text-anchor="middle" style="font-size:8px;font-weight:600;fill:#a855f7;">STAGE 1</text>
  <text x="193" y="68" text-anchor="middle" class="label">감정 분석</text>
  <text x="193" y="82" text-anchor="middle" class="sublabel">강도 1~5 판정</text>

  <!-- Arrow -->
  <line x1="243" y1="62" x2="273" y2="62" stroke="#a855f7" stroke-width="1.5" marker-end="url(#mPurple)"/>

  <!-- Stage 2: Intent Classification -->
  <rect x="276" y="34" width="100" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="326" y="54" text-anchor="middle" style="font-size:8px;font-weight:600;fill:#3b82f6;">STAGE 2</text>
  <text x="326" y="68" text-anchor="middle" class="label">의도 분류</text>
  <text x="326" y="82" text-anchor="middle" class="sublabel">GPT Function Calling</text>

  <!-- Emotion override branch -->
  <path d="M193,90 L193,120 L500,120 L500,148" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#mRed)"/>
  <rect x="280" y="108" width="130" height="16" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="345" y="119" text-anchor="middle" style="font-size:7.5px;fill:#dc2626;font-weight:600;">감정 강도 >= 4 자동 개입</text>

  <!-- Stage 3: Router -->
  <line x1="376" y1="62" x2="406" y2="62" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#mBlue2)"/>

  <rect x="409" y="34" width="80" height="56" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="449" y="54" text-anchor="middle" style="font-size:8px;font-weight:600;fill:#4f46e5;">STAGE 3</text>
  <text x="449" y="68" text-anchor="middle" class="label">Router</text>
  <text x="449" y="82" text-anchor="middle" class="sublabel">에이전트 선택</text>

  <!-- 4 Agent branches -->
  <!-- Career Coach -->
  <line x1="449" y1="90" x2="370" y2="148" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#mBlue)"/>

  <rect x="310" y="150" width="120" height="80" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="310" y="150" width="120" height="20" rx="8" fill="#4f46e5"/>
  <rect x="310" y="162" width="120" height="8" fill="#4f46e5"/>
  <text x="370" y="165" text-anchor="middle" class="agent-name" fill="#fff">Career Coach</text>
  <text x="370" y="186" text-anchor="middle" class="tool">- 이력서 피드백</text>
  <text x="370" y="198" text-anchor="middle" class="tool">- 모의면접</text>
  <text x="370" y="210" text-anchor="middle" class="tool">- 커리어 조언</text>

  <!-- Researcher -->
  <line x1="449" y1="90" x2="449" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#mBlue2)"/>

  <rect x="439" y="150" width="120" height="80" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="439" y="150" width="120" height="20" rx="8" fill="#3b82f6"/>
  <rect x="439" y="162" width="120" height="8" fill="#3b82f6"/>
  <text x="499" y="165" text-anchor="middle" class="agent-name" fill="#fff">Researcher</text>
  <text x="499" y="186" text-anchor="middle" class="tool">- 공공데이터포털 채용</text>
  <text x="499" y="198" text-anchor="middle" class="tool">- 사람인 API</text>
  <text x="499" y="210" text-anchor="middle" class="tool">- 시장 분석</text>

  <!-- Mental Care -->
  <line x1="489" y1="62" x2="500" y2="62" stroke="#94a3b8" stroke-width="1"/>
  <line x1="500" y1="62" x2="500" y2="148" stroke="#ef4444" stroke-width="1.5" marker-end="url(#mRed)"/>

  <rect x="568" y="150" width="120" height="80" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="568" y="150" width="120" height="20" rx="8" fill="#ef4444"/>
  <rect x="568" y="162" width="120" height="8" fill="#ef4444"/>
  <text x="628" y="165" text-anchor="middle" class="agent-name" fill="#fff">Mental Care</text>
  <text x="628" y="186" text-anchor="middle" class="tool">- 감정 공감 대화</text>
  <text x="628" y="198" text-anchor="middle" class="tool">- 호흡 운동 가이드</text>
  <text x="628" y="210" text-anchor="middle" class="tool">- 스트레스 관리</text>

  <!-- Fix Mental Care arrow from router -->
  <line x1="500" y1="90" x2="568" y2="150" stroke="#ef4444" stroke-width="0" />
  <line x1="489" y1="75" x2="628" y2="148" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>

  <!-- Mentor -->
  <rect x="180" y="150" width="120" height="80" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <rect x="180" y="150" width="120" height="20" rx="8" fill="#10b981"/>
  <rect x="180" y="162" width="120" height="8" fill="#10b981"/>
  <text x="240" y="165" text-anchor="middle" class="agent-name" fill="#fff">Mentor</text>
  <text x="240" y="186" text-anchor="middle" class="tool">- 학습 로드맵</text>
  <text x="240" y="198" text-anchor="middle" class="tool">- 기술 스택 추천</text>
  <text x="240" y="210" text-anchor="middle" class="tool">- 동기부여</text>

  <line x1="449" y1="90" x2="300" y2="148" stroke="#10b981" stroke-width="1.5" marker-end="url(#mGreen)"/>

  <!-- Response merge -->
  <rect x="280" y="254" width="250" height="34" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="405" y="272" text-anchor="middle" class="label">WebSocket Streaming Response</text>
  <text x="405" y="284" text-anchor="middle" class="sublabel">FastAPI + React + Zustand</text>

  <line x1="240" y1="230" x2="330" y2="252" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#mGray)"/>
  <line x1="370" y1="230" x2="380" y2="252" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#mGray)"/>
  <line x1="499" y1="230" x2="430" y2="252" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#mGray)"/>
  <line x1="628" y1="230" x2="480" y2="252" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#mGray)"/>

  <defs>
    <marker id="mBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
    </marker>
    <marker id="mBlue2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="mPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a855f7"/>
    </marker>
    <marker id="mGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
    <marker id="mRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="mGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>