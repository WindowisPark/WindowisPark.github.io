<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" fill="none">
  <style>
    text { font-family: 'Pretendard Variable', 'Inter', system-ui, sans-serif; }
    .title { font-size: 11px; font-weight: 700; fill: #4f46e5; }
    .label { font-size: 10px; font-weight: 600; fill: #0f172a; }
    .sublabel { font-size: 8.5px; fill: #64748b; }
    .module { font-size: 8px; font-weight: 600; fill: #4f46e5; }
  </style>

  <!-- 비동기 분석 파이프라인 -->
  <text x="360" y="16" text-anchor="middle" class="title">hub.green-scout  -  비동기 분석 파이프라인 + RBAC</text>

  <!-- Client Layer -->
  <rect x="20" y="34" width="100" height="44" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="70" y="54" text-anchor="middle" class="label">Sponsor</text>
  <text x="70" y="68" text-anchor="middle" class="sublabel">분석 요청</text>

  <!-- Arrow -->
  <line x1="120" y1="56" x2="155" y2="56" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#aBlue)"/>

  <!-- scout-api -->
  <rect x="158" y="30" width="140" height="116" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="228" y="48" text-anchor="middle" class="module">scout-api</text>
  <line x1="168" y1="54" x2="288" y2="54" stroke="#e2e8f0" stroke-width="1"/>

  <!-- API 내부 -->
  <rect x="170" y="62" width="116" height="28" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="228" y="80" text-anchor="middle" class="sublabel">REST Controller</text>

  <rect x="170" y="96" width="116" height="28" rx="5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="228" y="114" text-anchor="middle" class="sublabel">RBAC Filter (5-tier)</text>

  <!-- Arrow to Databricks -->
  <line x1="298" y1="76" x2="348" y2="76" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <text x="323" y="70" text-anchor="middle" class="sublabel">Jobs API 2.1</text>

  <!-- Databricks -->
  <rect x="350" y="34" width="130" height="84" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="54" text-anchor="middle" class="label">Databricks</text>
  <line x1="360" y1="60" x2="470" y2="60" stroke="#fde68a" stroke-width="1"/>
  <text x="415" y="78" text-anchor="middle" class="sublabel">비동기 분석 실행</text>
  <text x="415" y="94" text-anchor="middle" class="sublabel">(환자 코호트 쿼리)</text>
  <text x="415" y="110" text-anchor="middle" class="sublabel">운영 DB 부하 분리</text>

  <!-- Webhook callback -->
  <path d="M415,118 L415,160 L298,160" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#aGreen)"/>
  <text x="370" y="146" text-anchor="middle" class="sublabel">Webhook</text>
  <text x="370" y="158" text-anchor="middle" class="sublabel">콜백</text>

  <!-- Polling fallback -->
  <path d="M298,76 C318,76 330,130 350,180" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <path d="M350,180 L415,180 L415,118" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#aGray)"/>
  <text x="430" y="180" class="sublabel">폴링 Fallback</text>

  <!-- scout-core -->
  <rect x="158" y="168" width="140" height="60" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="228" y="186" text-anchor="middle" class="module">scout-core</text>
  <line x1="168" y1="192" x2="288" y2="192" stroke="#e2e8f0" stroke-width="1"/>
  <text x="228" y="208" text-anchor="middle" class="sublabel">Domain / Service</text>
  <text x="228" y="222" text-anchor="middle" class="sublabel">Entity / Repository</text>

  <!-- Module arrow -->
  <line x1="228" y1="146" x2="228" y2="165" stroke="#6366f1" stroke-width="1.5" marker-end="url(#aPurple)"/>

  <!-- DB -->
  <rect x="350" y="178" width="80" height="44" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="198" text-anchor="middle" class="label">MySQL</text>
  <text x="390" y="212" text-anchor="middle" class="sublabel">Flyway 70+</text>

  <line x1="298" y1="198" x2="348" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#aGray)"/>

  <!-- RBAC Detail -->
  <rect x="520" y="34" width="185" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="612" y="52" text-anchor="middle" class="label">RBAC 5-tier 권한 계층</text>
  <line x1="530" y1="58" x2="695" y2="58" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Tiers -->
  <rect x="534" y="66" width="157" height="18" rx="3" fill="#4f46e5"/>
  <text x="612" y="79" text-anchor="middle" style="font-size:8px;fill:#fff;font-weight:600;">SUPER_ADMIN - 전체 접근</text>

  <rect x="534" y="88" width="157" height="18" rx="3" fill="#6366f1"/>
  <text x="612" y="101" text-anchor="middle" style="font-size:8px;fill:#fff;font-weight:600;">ADMIN - 관리 기능</text>

  <rect x="534" y="110" width="157" height="18" rx="3" fill="#818cf8"/>
  <text x="612" y="123" text-anchor="middle" style="font-size:8px;fill:#fff;font-weight:600;">MANAGER - 프로젝트 관리</text>

  <rect x="534" y="132" width="157" height="18" rx="3" fill="#a5b4fc"/>
  <text x="612" y="145" text-anchor="middle" style="font-size:8px;fill:#312e81;font-weight:600;">SPONSOR - PII 자동 마스킹</text>

  <rect x="534" y="154" width="157" height="4" rx="2" fill="#e2e8f0"/>

  <!-- Masking callout -->
  <rect x="520" y="178" width="185" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="612" y="194" text-anchor="middle" class="sublabel">SPONSOR 역할: 환자 PII</text>
  <text x="612" y="208" text-anchor="middle" style="font-size:8px;fill:#dc2626;font-weight:600;">이름/연락처/주민번호 자동 마스킹</text>

  <!-- Arrow from RBAC filter to detail -->
  <line x1="286" y1="110" x2="312" y2="110" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <line x1="312" y1="110" x2="312" y2="96" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <line x1="312" y1="96" x2="518" y2="96" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3" marker-end="url(#aGray)"/>

  <defs>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
    </marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#16a34a"/>
    </marker>
    <marker id="aGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="aPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
  </defs>
</svg>